{% comment %}Reusable form field rendering partial. Expects: field (BoundField), label (optional), help_text (optional){% endcomment %}
<div class="form-group">
    <label for="{{ field.id_for_label }}">{% if label %}{{ label }}{% else %}{{ field.label }}{% endif %}{% if field.field.required %} <span class="required">*</span>{% endif %}</label>
    {% if field.errors %}
        <span id="{{ field.name }}-error" class="error-message">{{ field.errors.as_text|linebreaksbr }}</span>
    {% endif %}
    {{ field }}
    {% if field.help_text %}
        <small class="form-text">{{ field.help_text }}</small>
    {% endif %}
</div>
